/**:
    ros__parameters:
        # ── FAST-LIO2 base parameters ──────────────────────────────────────────
        feature_extract_enable: false
        point_filter_num: 3          # Velodyne HDL-64E: dense → filter more
        max_iteration: 3
        filter_size_surf: 0.25       # initial/fallback voxel (adaptive takes over)
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "/home/thailuu/results/genz_lio_kitti_map.pcd"

        common:
            lid_topic:  "/velodyne_points"
            imu_topic:  "/imu/data"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 2          # 2 = Velodyne
            scan_line: 64          # Velodyne HDL-64E
            blind: 1.0

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.01
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree: 360.0
            det_range: 150.0       # HDL-64E max range
            extrinsic_est_en: false

            # KITTI raw 2011_10_03: T_velo_to_imu
            extrinsic_T: [ 0.811, -0.320, 0.800 ]
            extrinsic_R: [ 9.999976e-01,  7.854027e-04,  2.024406e-03,
                           7.553071e-04,  9.998898e-01,  1.482454e-02,
                          -2.035188e-03, -1.482298e-02,  9.998881e-01 ]

        publish:
            path_en: true
            scan_publish_en: true
            dense_publish_en: false
            scan_bodyframe_pub_en: false

        pcd_save:
            pcd_save_en: false
            interval: -1

        # ── GenZ-LIO: Scale-aware adaptive voxelization (Algorithm 1) ─────────
        adaptive_vox:
            enable: true

            # Sliding window for scale indicator
            Nw: 5

            # Voxel size bounds [m]
            d_min: 0.05
            d_max: 1.5

            # Voxelized point count bounds (HDL-64E: ~120k pts/scan, denser)
            N_min: 1500.0
            N_max: 5000.0

            # Scale threshold [m]: KITTI urban/highway — use 20 m
            tau_m: 20.0

            # Setpoint interpolation exponent
            p_exp: 2.0

            # Normalisation scaling factors
            lambda_p: 0.1
            lambda_d: 0.2

            # PD gain bounds
            Kp_min: 1.0e-6
            Kp_max: 1.0e-4
            Kd_min: 1.0e-9
            Kd_max: 1.0e-7

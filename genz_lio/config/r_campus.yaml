/**:
    ros__parameters:
        # ── FAST-LIO2 base parameters ──────────────────────────────────────────
        feature_extract_enable: false
        point_filter_num: 1
        max_iteration: 3
        # Initial/fallback voxel size (used before adaptive kicks in)
        filter_size_surf: 0.25
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "/home/thailuu/results/genz_lio_map.pcd"

        common:
            lid_topic:  "/livox/lidar"
            imu_topic:  "/livox/imu"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 1          # 1 = Livox Avia
            scan_line: 6
            blind: 2.0

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree: 360.0
            det_range: 450.0
            extrinsic_est_en: false
            # Livox Avia extrinsics (Lidar-to-IMU)
            extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
            extrinsic_R: [ 1., 0., 0.,
                           0., 1., 0.,
                           0., 0., 1. ]

        publish:
            path_en: true
            scan_publish_en: true
            dense_publish_en: false
            scan_bodyframe_pub_en: false

        pcd_save:
            pcd_save_en: false
            interval: -1

        # ── GenZ-LIO: Scale-aware adaptive voxelization (Algorithm 1) ─────────
        adaptive_vox:
            enable: true

            # Sliding window length for scale indicator m̄_t
            Nw: 5

            # Voxel size bounds [m]
            d_min: 0.02
            d_max: 1.0

            # Voxelized point count bounds
            N_min: 1000.0
            N_max: 4000.0

            # Scale threshold τ_m [m]: beyond this, N_desired saturates to N_max
            # R-Campus is a 1400 m outdoor campus route → use 30 m
            tau_m: 30.0

            # Setpoint interpolation exponent p (Eq. 2)
            p_exp: 2.0

            # Normalisation scaling factors for gain scheduling (Eq. 4)
            lambda_p: 0.1
            lambda_d: 0.2

            # PD gain bounds (Eq. 6)
            Kp_min: 1.0e-6
            Kp_max: 1.0e-4
            Kd_min: 1.0e-9
            Kd_max: 1.0e-7
